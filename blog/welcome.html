<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — Taylor Tabile</title>
<meta name="description" content="A quick hello and what to expect from this blog.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --ink:#12213a; --muted:#5b6b82; --accent:#2590eb; --line:#e6ebf2; }
  body { margin:0; font-family:'IBM Plex Sans',system-ui,sans-serif; color:var(--ink); line-height:1.7; }
  .wrap { max-width:680px; margin:0 auto; padding:64px 24px 96px; }
  a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
  .back { font-size:.85rem; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); }
  h1 { font-family:'Oswald',sans-serif; font-weight:600; font-size:2.4rem; margin:.4em 0 .1em; }
  .date { font-size:.8rem; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); }
  p { font-size:1.08rem; }
</style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/blog/">&larr; Blog</a>
    <h1>Welcome</h1>
    <p class="date">Placeholder post</p>
    <p>This is a starter post so the blog isn't empty on day one. When you write your first real post, create a new file in the <code>blog/</code> folder, add a link to it from <code>blog/index.html</code>, and delete this file.</p>
    <p>Then just <code>git push</code> — and it's live.</p>
  </div>
</body>
</html>
